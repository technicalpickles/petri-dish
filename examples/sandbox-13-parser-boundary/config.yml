name: sandbox-13-parser-boundary
description: "Parser boundary test: which complex bash constructs auto-allow with autoAllowBashIfSandboxed"

environment:
  name: test-sbox-13-parser
  plugins: []
  settings:
    sandbox:
      enabled: true
      autoAllowBashIfSandboxed: true

runtime:
  work_dir: /tmp/sandbox-test
  preamble: lib/preambles/sandbox.md
  inject_results_file: true
  model: haiku
  timeout: 600

prompt_mode: accept
