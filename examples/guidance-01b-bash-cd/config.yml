name: guidance-01b-bash-cd
description: "Bash variant forcing cd into a temp directory. Observes cd+write+redirect patterns and bash-security-check interaction. Model=sonnet, sandbox=on."

environment:
  name: test-guidance-01b-bash-cd
  plugins: []
  settings:
    env:
      ENABLE_CLAUDEAI_MCP_SERVERS: "false"
    sandbox:
      enabled: true
      autoAllowBashIfSandboxed: true
    permissions:
      allow:
        - Read
        - Write
        - Bash

runtime:
  work_dir: /tmp/sandbox-test
  preamble: lib/preambles/guidance.md
  inject_results_file: true
  model: sonnet
  timeout: 180

prompt_mode: accept
