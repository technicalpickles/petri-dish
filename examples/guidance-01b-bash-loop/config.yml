name: guidance-01b-bash-loop
description: "Bash variant with shell loop creating multiple files. Observes path strategy at scale (hardcoded vs $TMPDIR expansion). Model=sonnet, sandbox=on."

environment:
  name: test-guidance-01b-bash-loop
  plugins: []
  settings:
    env:
      ENABLE_CLAUDEAI_MCP_SERVERS: "false"
    sandbox:
      enabled: true
      autoAllowBashIfSandboxed: true
    permissions:
      allow:
        - Read
        - Write
        - Bash

runtime:
  work_dir: /tmp/sandbox-test
  preamble: lib/preambles/guidance.md
  inject_results_file: true
  model: sonnet
  timeout: 180

prompt_mode: accept
