name: sandbox-13b-parser-followup
description: "Follow-up tests confirming double-quote masking, tracked vars, write paths, and nesting"

environment:
  name: test-sbox-13-parser
  plugins: []
  settings:
    sandbox:
      enabled: true
      autoAllowBashIfSandboxed: true

runtime:
  work_dir: /tmp/sandbox-test
  preamble: lib/preambles/sandbox.md
  inject_results_file: true
  model: haiku
  timeout: 600

prompt_mode: accept
