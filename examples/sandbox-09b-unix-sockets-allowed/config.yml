name: sandbox-09b-unix-sockets-allowed
description: "Unix sockets: allowAllUnixSockets enabled"

environment:
  name: test-sbox-09b-unix-sockets-allowed
  plugins: []
  settings:
    sandbox:
      enabled: true
      autoAllowBashIfSandboxed: true
      network:
        allowAllUnixSockets: true
    permissions:
      allow:
        - Read
        - Write
        - Edit
        - WebFetch

runtime:
  work_dir: /tmp/sandbox-test
  preamble: lib/preambles/sandbox.md
  inject_results_file: true
  part_suffix: "Run Part B only."
  timeout: 300

prompt_mode: accept
