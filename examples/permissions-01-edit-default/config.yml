name: permissions-01-edit-default
description: "Layer 1 star: Edit tool on a plain file under default permission mode, no Edit in allow list, expect prompt"

environment:
  name: test-perms-01-edit-default
  plugins: []
  settings:
    sandbox:
      enabled: true
      autoAllowBashIfSandboxed: true
    permissions:
      allow:
        - Read
        - Write

runtime:
  work_dir: /tmp/sandbox-test
  preamble: lib/preambles/permissions.md
  inject_results_file: true
  model: haiku
  timeout: 300

prompt_mode: accept
