name: guidance-01b-bash-cd-subdir
description: "Bash variant forcing mkdir + cd into a subdirectory. Tests whether Claude batches mkdir+cd+write into a compound command (needed since shell cwd resets between Bash calls). Model=sonnet, sandbox=on."

environment:
  name: test-guidance-01b-bash-cd-subdir
  plugins: []
  settings:
    env:
      ENABLE_CLAUDEAI_MCP_SERVERS: "false"
    sandbox:
      enabled: true
      autoAllowBashIfSandboxed: true
    permissions:
      allow:
        - Read
        - Write
        - Bash

runtime:
  work_dir: /tmp/sandbox-test
  preamble: lib/preambles/guidance.md
  inject_results_file: true
  model: sonnet
  timeout: 180

prompt_mode: accept
