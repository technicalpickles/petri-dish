name: sandbox-09-unix-sockets
description: "Unix sockets: default sandbox, sockets blocked"

environment:
  name: test-sbox-09-unix-sockets
  plugins: []
  settings:
    sandbox:
      enabled: true
      autoAllowBashIfSandboxed: true
    permissions:
      allow:
        - Read
        - Write
        - Edit
        - WebFetch

runtime:
  work_dir: /tmp/sandbox-test
  preamble: lib/preambles/sandbox.md
  inject_results_file: true
  part_suffix: "Run Part A only."
  timeout: 300

prompt_mode: accept
