name: sandbox-12c-lean
description: "Lean rerun of 12c comment position probe (Haiku, no analysis)"

environment:
  name: test-sbox-12c-lean
  plugins: []
  settings:
    sandbox:
      enabled: true
      autoAllowBashIfSandboxed: false

runtime:
  work_dir: /tmp/sandbox-test
  preamble: lib/preambles/sandbox.md
  inject_results_file: true
  model: haiku
  timeout: 300

prompt_mode: accept
