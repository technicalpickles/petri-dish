name: sandbox-07c-excluded-commands
description: "Excluded commands: docker excluded from sandbox, escape hatch disabled"

environment:
  name: test-sbox-07c-excluded-commands
  plugins: []
  settings:
    sandbox:
      enabled: true
      autoAllowBashIfSandboxed: true
      allowUnsandboxedCommands: false
      excludedCommands:
        - "docker"
    permissions:
      allow:
        - Read
        - Write
        - Edit
        - WebFetch

runtime:
  work_dir: /tmp/sandbox-test
  preamble: lib/preambles/sandbox.md
  inject_results_file: true
  part_suffix: "Run Part C only."
  timeout: 300

prompt_mode: accept
