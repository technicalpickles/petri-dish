name: guidance-01b-sonnet-nosandbox
description: "Matrix variant of 01b: model=sonnet, sandbox=off."

environment:
  name: test-guidance-01b-sonnet-nosandbox
  plugins: []
  settings:
    env:
      ENABLE_CLAUDEAI_MCP_SERVERS: "false"
    sandbox:
      enabled: false
    permissions:
      allow:
        - Read
        - Write
        - Bash

runtime:
  work_dir: /tmp/sandbox-test
  preamble: lib/preambles/guidance.md
  inject_results_file: true
  model: sonnet
  timeout: 180

prompt_mode: accept
