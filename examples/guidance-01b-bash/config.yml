name: guidance-01b-bash
description: "Bash variant of 01b: force shell operations to observe hardcoded path vs $TMPDIR shell expansion. Model=sonnet, sandbox=on."

environment:
  name: test-guidance-01b-bash
  plugins: []
  settings:
    env:
      ENABLE_CLAUDEAI_MCP_SERVERS: "false"
    sandbox:
      enabled: true
      autoAllowBashIfSandboxed: true
    permissions:
      allow:
        - Read
        - Write
        - Bash

runtime:
  work_dir: /tmp/sandbox-test
  preamble: lib/preambles/guidance.md
  inject_results_file: true
  model: sonnet
  timeout: 180

prompt_mode: accept
