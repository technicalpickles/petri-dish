name: guidance-01b-opus
description: "Matrix variant of 01b: model=opus, sandbox=on."

environment:
  name: test-guidance-01b-opus
  plugins: []
  settings:
    env:
      ENABLE_CLAUDEAI_MCP_SERVERS: "false"
    sandbox:
      enabled: true
      autoAllowBashIfSandboxed: true
    permissions:
      allow:
        - Read
        - Write
        - Bash

runtime:
  work_dir: /tmp/sandbox-test
  preamble: lib/preambles/guidance.md
  inject_results_file: true
  model: opus
  timeout: 180

prompt_mode: accept
